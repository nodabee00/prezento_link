<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠팡 로켓배송 최저가 확인</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, sans-serif; background-color: #f8f9fa; text-align: center; }
        
        .loader { width: 48px; height: 48px; border: 5px solid #eee; border-bottom-color: #cb1400; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .footer { position: absolute; bottom: 30px; font-size: 11px; color: #bbb; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="loader-view">
        <span class="loader"></span>
        <div style="margin-top: 20px; font-weight: bold; color: #333;">쿠팡 앱으로 연결 중입니다...</div>
        <div style="margin-top: 8px; font-size: 13px; color: #888;">잠시만 기다려주세요.</div>
    </div>

    <div class="footer">
        본 페이지는 쿠팡 파트너스 활동의 일환으로,<br>이에 따른 일정액의 수수료를 제공받을 수 있습니다.
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');
        const coupangUrl = itemId ? "https://link.coupang.com/a/" + itemId : null;

        if (coupangUrl) {
            const ua = navigator.userAgent.toLowerCase();
            const isAndroid = /android/i.test(ua);
            const isIOS = /iphone|ipad|ipod/i.test(ua);
            const isInAppBrowser = /pinterest|kakaotalk|kakaostory|instagram|facebook|line|band/i.test(ua);

            setTimeout(() => {
                if (isAndroid && isInAppBrowser) {
                    // 1. 안드로이드: 크롬 브라우저를 통한 인텐트(Intent) 강제 호출 탈출
                    const intentUrl = 'intent://' + coupangUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=https;package=com.android.chrome;end';
                    location.href = intentUrl;
                    
                } else if (isIOS && isInAppBrowser) {
                    // 2. 아이폰(iOS): 인포크링크 방식 (target="_top" 가상 클릭 딥링크 발동)
                    const a = document.createElement('a');
                    a.href = coupangUrl;
                    a.target = '_top'; // 인앱 브라우저 프레임을 무시하고 최상단 이동 명령
                    document.body.appendChild(a);
                    a.click(); // 스크립트가 사람 대신 즉시 클릭
                    
                } else {
                    // 3. 일반 사파리/크롬/PC 접속 시 자연스러운 이동
                    location.replace(coupangUrl);
                }
            }, 400); // 핀터레스트 봇 회피용 0.4초 딜레이
            
        } else {
            document.getElementById('loader-view').innerHTML = "<b>올바른 상품 링크가 아닙니다.</b>";
        }
    </script>
</body>
</html>
