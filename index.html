<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠팡 로켓배송 확인 중...</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, sans-serif; background-color: #f8f9fa; text-align: center; }
        
        .loader { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-bottom-color: #cb1400; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .msg { margin-top: 15px; font-size: 15px; font-weight: bold; color: #333; }
        .sub-msg { margin-top: 5px; font-size: 12px; color: #888; }
        
        .footer { position: absolute; bottom: 20px; font-size: 10px; color: #bbb; line-height: 1.4; }
    </style>
</head>
<body>

    <span class="loader"></span>
    <div class="msg">안전하게 쿠팡으로 이동하고 있습니다.</div>
    <div class="sub-msg">잠시만 기다려주세요.</div>

    <div class="footer">
        본 페이지는 쿠팡 파트너스 활동의 일환으로,<br>이에 따른 일정액의 수수료를 제공받을 수 있습니다.
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');

        if (itemId) {
            const coupangUrl = "https://link.coupang.com/a/" + itemId;
            
            // 핀터레스트 봇이 스팸으로 오해하지 않게 0.6초만 쉬었다가
            // 아무런 기교 없이 쿠팡 공식 웹으로 조용히 넘겨줌
            setTimeout(() => {
                location.replace(coupangUrl);
            }, 600);
            
        } else {
            document.querySelector('.msg').innerText = "상품 정보가 없습니다.";
            document.querySelector('.sub-msg').innerText = "정상적인 경로로 접속해 주세요.";
            document.querySelector('.loader').style.display = 'none';
        }
    </script>
</body>
</html>
