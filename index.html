<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠팡 로켓배송 안전 연결</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f2f2f2; text-align: center; }
        
        /* 1. 일반 웹용 로딩 화면 (기본 표시) */
        #loading-view { display: flex; flex-direction: column; align-items: center; }
        .loader { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-bottom-color: #cb1400; border-radius: 50%; animation: rotation 1s linear infinite; margin-bottom: 15px; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { font-size: 15px; font-weight: bold; color: #333; }
        .loading-sub { font-size: 12px; color: #888; margin-top: 5px; }

        /* 2. 인앱 브라우저용 신뢰감 카드 화면 (처음엔 숨김) */
        #card-view { display: none; background: white; width: 85%; max-width: 360px; border-radius: 16px; padding: 30px 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .logo-text { font-size: 24px; font-weight: 900; letter-spacing: -1px; margin-bottom: 20px; }
        .coupang-red { color: #cb1400; }
        .info-title { font-size: 17px; font-weight: bold; color: #333; margin-bottom: 12px; }
        .info-desc { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 25px; word-break: keep-all; }
        .highlight { background-color: #fff3cd; font-weight: 600; }
        .action-btn { display: block; width: 100%; background-color: #cb1400; color: white; text-decoration: none; padding: 16px 0; border-radius: 8px; font-size: 16px; font-weight: bold; box-shadow: 0 4px 6px rgba(203, 20, 0, 0.2); }
        
        /* 공통 푸터 */
        .footer { position: absolute; bottom: 20px; font-size: 11px; color: #aaa; line-height: 1.4; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div id="loading-view">
        <div class="loader"></div>
        <div class="loading-text">안전하게 쿠팡으로 이동하고 있습니다.</div>
        <div class="loading-sub">잠시만 기다려주세요.</div>
    </div>

    <div id="card-view">
        <div class="logo-text"><span class="coupang-red">coupang</span></div>
        <div class="info-title">앱으로 안전하게 이동합니다</div>
        <div class="info-desc">
            현재 핀터레스트 앱 환경에서는<br>
            <span class="highlight">자동 연결이 제한</span>되어 있습니다.<br><br>
            아래 버튼을 누르시면 쿠팡 앱으로<br>안전하고 빠르게 연결됩니다.
        </div>
        <a href="#" id="coupang-link" class="action-btn">🚀 쿠팡 앱에서 상품 보기</a>
    </div>

    <div class="footer">
        본 페이지는 쿠팡 파트너스 활동의 일환으로,<br>이에 따른 일정액의 수수료를 제공받습니다.
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');

        if (itemId) {
            const coupangUrl = "https://link.coupang.com/a/" + itemId;
            
            // 접속 환경 판독기 (핵심 로직)
            const ua = navigator.userAgent.toLowerCase();
            const isInAppBrowser = /pinterest|kakaotalk|kakaostory|instagram|facebook|line|band/i.test(ua);

            if (isInAppBrowser) {
                // [루트 A] 핀터레스트 앱으로 들어온 경우 -> 로딩창 끄고 버튼 카드 띄우기
                document.getElementById('loading-view').style.display = 'none';
                document.getElementById('card-view').style.display = 'block';
                
                const btn = document.getElementById('coupang-link');
                btn.href = coupangUrl;
                btn.target = "_top"; // 딥링크 강제 실행을 위한 마법의 속성
            } else {
                // [루트 B] 일반 사파리, 크롬, PC로 들어온 경우 -> 카드 숨긴 채로 0.6초 뒤 자동 이동
                setTimeout(() => {
                    location.replace(coupangUrl);
                }, 600);
            }
        } else {
            // 주소에 상품 ID가 없을 경우 에러 처리
            document.getElementById('loading-view').innerHTML = "<div class='loading-text'>상품 정보가 없습니다.</div><div class='loading-sub'>올바른 링크로 다시 접속해주세요.</div>";
        }
    </script>
</body>
</html>
